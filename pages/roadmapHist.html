<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cedeefe</title>

    <!-- Ícones do Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Ícones Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS externo -->
    <link rel="stylesheet" href="../estilos/sidebar.css">
    <link rel="stylesheet" href="../estilos/roadmapsDisc.css">
</head>
<body>

     <!-- SIDEBARRRR -->
    <div id="sidebar-container"></div>

        <div class="header">
        <div>
            <h1>Roadmaps</h1>
            <h2>Estude a história do mundo com facilidade.</h2>
        </div>

        <span class="icone">
           <span class="material-symbols-outlined icone2">history_edu</span>
        </span>
    </div>

            
<div class="timeline">

    <!-- Módulo 1 -->
    <div class="modulo">
        <div class="numero">1</div>
        <div class="conteudo">
            <h3>Fundamentos</h3>
            <ul>
                <label><input type="checkbox"> Historiografia</label> <br>
                <label><input type="checkbox"> Tempo histórico</label> <br>
                <label><input type="checkbox"> Memória</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 2 -->
    <div class="modulo">
        <div class="numero">2</div>
        <div class="conteudo">
            <h3>Santa Catarina</h3>
            <ul>
                <label><input type="checkbox"> Povos originários</label> <br>
                <label><input type="checkbox"> Colonização</label> <br>
                <label><input type="checkbox"> Minorias e questões étnico-raciais</label> <br>
                <label><input type="checkbox"> Guerra do Contestado</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 3 -->
    <div class="modulo">
        <div class="numero">3</div>
        <div class="conteudo">
            <h3>Brasil</h3>
            <ul>
                <label><input type="checkbox"> Povos originários</label> <br>
                <label><input type="checkbox"> Escravidão</label> <br>
                <label><input type="checkbox"> Independência</label> <br>
                <label><input type="checkbox"> Brasil Monárquico</label> <br>
                <label><input type="checkbox"> Proclamação da República</label> <br>
                <label><input type="checkbox"> República Velha</label> <br>
                <label><input type="checkbox"> Era Vargas</label> <br>
                <label><input type="checkbox"> Ditadura Militar</label> <br>
                <label><input type="checkbox"> Redemocratização</label> <br>
                <label><input type="checkbox"> Neoliberalismo</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 4 -->
    <div class="modulo">
        <div class="numero">4</div>
        <div class="conteudo">
            <h3>História Geral</h3>
            <ul>
                <label><input type="checkbox"> Antiguidade</label> <br>
                <label><input type="checkbox"> Idade Média</label> <br>
                <label><input type="checkbox"> Idade Moderna</label> <br>
                <label><input type="checkbox"> Estados Nacionais</label> <br>
                <label><input type="checkbox"> Reformas religiosas</label> <br>
                <label><input type="checkbox"> Expansão marítima</label> <br>
                <label><input type="checkbox"> Iluminismo</label> <br>
                <label><input type="checkbox"> Revoluções burguesas</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 5 -->
    <div class="modulo">
        <div class="numero">5</div>
        <div class="conteudo">
            <h3>História Contemporânea</h3>
            <ul>
                <label><input type="checkbox"> Revolução Industrial</label> <br>
                <label><input type="checkbox"> Imperialismo</label> <br>
                <label><input type="checkbox"> Guerras Mundiais</label> <br>
                <label><input type="checkbox"> Período entreguerras</label> <br>
                <label><input type="checkbox"> Guerra Fria</label> <br>
                <label><input type="checkbox"> Independências na África e Ásia</label> <br>
                <label><input type="checkbox"> Movimentos de resistência</label> <br>
                <label><input type="checkbox"> Contracultura</label> <br>
                <label><input type="checkbox"> Direitos Humanos</label>
            </ul>
        </div>
    </div>

</div>


    <!-- Seu JS da sidebar -->
    <script src="../scripts/loadSidebar.js"></script>
    <script src="../scripts/sidebar.js"></script>

    <!-- Bootstrap JS (necessário pro dropdown funcionar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
