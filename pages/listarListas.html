<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cedeefe</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../estilos/sidebar.css">
    <link rel="stylesheet" href="../estilos/verLista.css">
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="content">
        <div class="header">
            <h1>Lista de Listas</h1>

            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Buscar lista..." aria-label="Search"/>
                <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i></button>
            </form>

            <button type="button" class="btn btn-outline-secondary">
                <i class="bi bi-collection-play"></i>
            </button>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th scope="col">Cod</th>
                    <th scope="col">Nome</th>
                    <th scope="col">Status</th>
                    <th scope="col">E-mail do usuário</th>
                    <th scope="col">Ações</th>
                </tr>
            </thead>

            <tbody id="lista-tbody">
                <tr>
                    <td colspan="5" class="text-center text-muted">Carregando listas...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="../scripts/loadSidebar.js"></script>
    <script src="../scripts/sidebar.js"></script>
    <script src="../scripts/listarListas.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
