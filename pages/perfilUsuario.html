<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"> <!-- Define a codificação UTF-8 -->
     <!-- Responsividade em dispositivos móveis -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cedeefe</title> <!-- Título da aba do navegador -->

    <!-- Ícones do Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Ícones Material Symbols (Google) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- CSS externo -->
    <link rel="stylesheet" href="../estilos/sidebar.css">
    <link rel="stylesheet" href="../estilos/perfilUsuario.css">
</head>
<body class="bg-light">
 
    <!-- SIDEBARRRR -->
    <div id="sidebar-container"></div>

    <div class="content">
                <!--
                    oie, aqui é o perfil do usuário, onde ele pode alterar seus dados pessoais, como nome, data de nascimento, gênero e escola. 
                    Além disso, ele pode visualizar seu email (que não pode ser alterado) e tem a opção de alterar sua senha.

                    as áreas ali com os dados, devem ter os que ja sao do usuario e ficar ali como se fosse um formulário pre respondido 
                    - tipo no ferretto, posso mandar print se necessário

                    para a alteração de senha vou fazer que nem o ferretto, quando clicar no botão de alterar senha, 
                    vai abrir um modal com os campos para a nova senha e confirmação da nova senha.
                -->

            <div class="header">
                <h1>Dados da Conta</h1>
            </div>

                <div class="dados-usuario">
                    <!-- Nome -->
                    <div class="mb-3">
                        <label for="nomeCompleto" class="form-label">Nome completo</label>
                        <input type="text" class="form-control" id="nomeCompleto" name="nomeCompleto" required>
                    </div>

                    <!-- Data de nascimento -->
                    <div class="mb-3">
                        <label for="dataNascimento" class="form-label">Data de nascimento</label>
                        <input type="date" class="form-control" id="dataNascimento" name="dataNascimento" required>
                    </div>

                    <!-- Gênero -->
                    <div class="mb-3">
                        <label class="form-label d-block">Gênero</label>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="genero" id="masc" value="Masculino">
                            <label class="form-check-label" for="masc">
                                Masculino
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="genero" id="fem" value="Feminino">
                            <label class="form-check-label" for="fem">
                                Feminino
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="genero" id="nb" value="Não-binário">
                            <label class="form-check-label" for="nb">
                                Não-binário
                            </label>
                        </div>
                        
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="genero" id="nd" value="Prefiro não declarar">
                            <label class="form-check-label" for="nd">
                                Prefiro não declarar
                            </label>
                        </div>
                    </div>

                    <!-- Escola -->
                    <div class="mb-3">
                        <label for="escola" class="form-label">Escola</label>
                        <input type="text" class="form-control" id="escola" name="escola">
                    </div>

                     <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>

                        <!-- Button trigger modal -->
                                <button type="button" class="btn btn-secondary mb-3" id="alterarSenhaBtn" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
                               <i class="bi bi-lock-fill"></i>Alterar senha
                                </button>

                                <!-- Modal -->
                                <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
                                <div class="modal-dialog modal-dialog-centered">
                                    <div class="modal-content">
                                    <div class="modal-header">
                                        <h2 class="modal-title fs-5" id="staticBackdropLabel">Alterar senha</h2>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                    </div>
                                    <div class="modal-body">
                                        <form>
                                            <div class="mb-3">
                                                <label for="senhaAtual" class="form-label">Senha atual</label>
                                                <input type="password" class="form-control" id="senhaAtual" name="senhaAtual" required>
                                            </div>

                                            <div class="mb-3">
                                                <label for="novaSenha" class="form-label">Nova senha</label>
                                                <input type="password" class="form-control" id="novaSenha" name="novaSenha" required>
                                            </div>

                                            <div class="mb-3">
                                                <label for="confirmarSenha" class="form-label">Confirmar nova senha</label>
                                                <input type="password" class="form-control" id="confirmarSenha" name="confirmarSenha" required>
                                            </div>
                                        </form>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-rosa" data-bs-dismiss="modal">Cancelar</button>
                                        <button type="button" class="btn btn-verde">salvar</button>
                                    </div>
                                    </div>
                                </div>
                                </div>





                    <!--
                    <button type="button" class="btn btn-secondary mb-3" id="alterarSenhaBtn"><i class="bi bi-lock-fill"></i>   Alterar senha</button>-->

                    <!-- Cancelar-->
                    <button type="button" class="btn btn-rosa mb-3" id="cancelarBtn">Cancelar</button>
                    <!-- Salvar-->
                    <button type="button" class="btn btn-verde mb-3" id="salvarBtn">Salvar</button>
                </div>

    </div>

<!-- Seu JS da sidebar -->
<script src="../scripts/loadSidebar.js"></script>
<script src="../scripts/sidebar.js"></script>
<script src="../scripts/modal.js"></script>

<!-- Bootstrap JS -->
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
