<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desempenho</title>
</head>
<body>

    <!-- A ideia aqui é permitir o adm visualizar um perfil do estudante com as listas criadas(flashcards também) e desempenho -->
    <!-- Esse perfil pode ser acessado a partir da listagem de usuários -->

    <header>
        <h1>Perfil do Aluno</h1>
    </header>
    
    <div class="desempenhoAluno">

        <h2>Desempenho</h2>

        <div>
            <h3>Questões Respondidas</h3>
            <p>29</p>
        </div>


        <div>
            <!--Gráfico de pizza-->
            <h3>Taxa de aproveitamento Geral</h3>
            <p>72%</p>
        </div>

        <div>
        <h3>Taxa de aproveitamento por Área</h3>

            <div>
                <h3>Matemática</h3>
                <p>Questões feitas</p> 
                <p>22</p>

                <p>Acertos</p>
                <p>18</p>

                <p>Erros</p>
                <p>4</p>

                <p>81%</p>
            </div>
        </div>
    </div>

    <div class="listasAluno">

        <h2> Listas</h2>
        
        <div>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Questões</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Pitágoras</td>
                        <td>15</td>
                        <td> <button>Ver Lista</button> </td>
                    </tr>
                </tbody>

            </table>
        </div>

    </div>



</body>
</html>
