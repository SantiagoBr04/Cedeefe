<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cedeefe</title>

    <!-- Ícones do Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>

    <!-- Ícones Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- CSS externo -->
    <link rel="stylesheet" href="../estilos/sidebar.css" />
    <link rel="stylesheet" href="../estilos/criarSimulado.css" />
  </head>
  <body>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="content">
    
      <!-- IMAGEM GATINHO E BLOB -->
      <img src="../imagens/blobverdeExp.svg" alt="blob verde" class="blob-verde"/>
      <img src="../imagens/gatinho.png" alt="gatinho" class="gatinho"/>

        <!-- FORMULÁRIO PARA CRIAR SIMULADO -->
        <form action="#" method="post" class="criarLista">
          <h2 class="titulo-form">Criar Simulado</h2>
           
          <!-- INPUT NOME DO SIMULADO -->
          <div id="itensformulario">

            <div class="item">
              <label for="nome">Nome do simulado: </label><br />
              <input type="text" class="nome" maxlength="30" minlength="1" />
            </div>

            <!-- INPUT DESCRIÇÃO DA LISTA -->
            <div class="item">
              <label for="descricao">Descrição: </label><br />
              <textarea name="descricao" class="descricao" rows="5" maxlength="100"></textarea>
            </div>

            <!-- INPUT QUANTIDADE DE QUESTÕES  -->
            <div class="item">
              <label for="nQuest">Quantidade de questões</label>
              <input type="number" value="45" class="nQuest"/>
            </div>



          <!-- BOTÃO PARA CRIAR A LISTA -->
          <button class="botao" type="submit">Criar</button>
        </form>
      </div>
    </div>

    <!-- Bootstrap JS (necessário pro dropdown funcionar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
