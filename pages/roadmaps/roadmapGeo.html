<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cedeefe</title>

    <!-- Ícones do Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Ícones Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS externo -->
    <link rel="stylesheet" href="../../estilos/sidebar.css">
    <link rel="stylesheet" href="../../estilos/roadmapsDisc.css">
</head>
<body>

     <!-- SIDEBARRRR -->
    <div id="sidebar-container"></div>

        <div class="header">
        <div>
            <h1>Roadmaps</h1>
            <h2>Conheça o mundo como a palma da sua mão.</h2>
        </div>

        <span class="icone">
           <span class="material-symbols-outlined icone2">globe</span>
        </span>
    </div>

            
<div class="timeline">

    <!-- Módulo 1 -->
    <div class="modulo">
        <div class="numero">1</div>
        <div class="conteudo">
            <h3>Conceitos Básicos</h3>
            <ul>
                <label><input type="checkbox"> Espaço geográfico</label> <br>
                <label><input type="checkbox"> Representações cartográficas</label> <br>
                <label><input type="checkbox"> Linguagem gráfica e iconográfica</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 2 -->
    <div class="modulo">
        <div class="numero">2</div>
        <div class="conteudo">
            <h3>Santa Catarina</h3>
            <ul>
                <label><input type="checkbox"> Formação territorial</label> <br>
                <label><input type="checkbox"> Aspectos históricos, econômicos e sociais</label> <br>
                <label><input type="checkbox"> Dinâmica urbana e rural</label> <br>
                <label><input type="checkbox"> Diversidade ambiental</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 3 -->
    <div class="modulo">
        <div class="numero">3</div>
        <div class="conteudo">
            <h3>Brasil</h3>
            <ul>
                <label><input type="checkbox"> Formação territorial</label> <br>
                <label><input type="checkbox"> Globalização do território</label> <br>
                <label><input type="checkbox"> Transformações ambientais</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 4 -->
    <div class="modulo">
        <div class="numero">4</div>
        <div class="conteudo">
            <h3>Geografia Mundial</h3>
            <ul>
                <label><input type="checkbox"> Capitalismo</label> <br>
                <label><input type="checkbox"> Mundialização / globalização</label> <br>
                <label><input type="checkbox"> Desigualdade social</label> <br>
                <label><input type="checkbox"> Mundo do trabalho</label>
            </ul>
        </div>
    </div>

</div>


    <!-- Seu JS da sidebar -->
    <script src="../../scripts/loadSidebar.js"></script>
    <script src="../../scripts/sidebar.js"></script>

    <!-- Bootstrap JS (necessário pro dropdown funcionar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
