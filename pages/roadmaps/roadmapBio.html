<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cedeefe</title>

    <!-- Ícones do Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Ícones Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS externo -->
    <link rel="stylesheet" href="../../estilos/sidebar.css">
    <link rel="stylesheet" href="../../estilos/roadmapsDisc.css">
</head>
<body>

     <!-- SIDEBARRRR -->
    <div id="sidebar-container"></div>

        <div class="header">
        <div>
            <h1>Roadmaps</h1>
            <h2>Estude biologia com mais clareza.</h2>
        </div>

        <span class="icone">
           <span class="material-symbols-outlined icone2">microbiology</span>
        </span>
    </div>

    
<div class="timeline">

    <!-- Módulo 1 -->
    <div class="modulo">
        <div class="numero">1</div>
        <div class="conteudo">
            <h3>Citologia</h3>
            <ul>
                <label><input type="checkbox"> Teoria celular</label> <br>
                <label><input type="checkbox"> Células procarióticas e eucarióticas</label> <br>
                <label><input type="checkbox"> Estruturas celulares</label> <br>
                <label><input type="checkbox"> Metabolismo celular</label> <br>
                <label><input type="checkbox"> DNA, genes e cromossomos</label> <br>
                <label><input type="checkbox"> Mitose, meiose e gametogênese</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 2 -->
    <div class="modulo">
        <div class="numero">2</div>
        <div class="conteudo">
            <h3>Ecologia</h3>
            <ul>
                <label><input type="checkbox"> Biodiversidade</label> <br>
                <label><input type="checkbox"> Ecossistemas (inclusive brasileiros)</label> <br>
                <label><input type="checkbox"> Sustentabilidade</label> <br>
                <label><input type="checkbox"> Poluição</label> <br>
                <label><input type="checkbox"> Efeito estufa</label> <br>
                <label><input type="checkbox"> Camada de ozônio</label> <br>
                <label><input type="checkbox"> Ameaças à biodiversidade</label> <br>
                <label><input type="checkbox"> Fontes e tipos de energia</label> <br>
                <label><input type="checkbox"> Conservação ambiental</label> <br>
                <label><input type="checkbox"> Educação indígena e quilombola</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 3 -->
    <div class="modulo">
        <div class="numero">3</div>
        <div class="conteudo">
            <h3>Genética e Biotecnologia</h3>
            <ul>
                <label><input type="checkbox"> Estudos de Mendel</label> <br>
                <label><input type="checkbox"> 1ª Lei de Mendel</label> <br>
                <label><input type="checkbox"> Interações alélicas</label> <br>
                <label><input type="checkbox"> Aplicações da genética</label> <br>
                <label><input type="checkbox"> Biotecnologia</label> <br>
                <label><input type="checkbox"> Questões éticas, bioéticas e socioambientais</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 4 -->
    <div class="modulo">
        <div class="numero">4</div>
        <div class="conteudo">
            <h3>Seres Vivos</h3>
            <ul>
                <label><input type="checkbox"> Características gerais</label> <br>
                <label><input type="checkbox"> Classificação (animais, vegetais, fungos e microrganismos)</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 5 -->
    <div class="modulo">
        <div class="numero">5</div>
        <div class="conteudo">
            <h3>Corpo Humano e Saúde</h3>
            <ul>
                <label><input type="checkbox"> Estrutura e funcionamento do corpo</label> <br>
                <label><input type="checkbox"> Vacinas</label> <br>
                <label><input type="checkbox"> Doenças dos sistemas</label> <br>
                <label><input type="checkbox"> Substâncias psicoativas</label> <br>
                <label><input type="checkbox"> Órgãos dos sentidos</label> <br>
                <label><input type="checkbox"> Ciclo menstrual</label> <br>
                <label><input type="checkbox"> Fecundação</label> <br>
                <label><input type="checkbox"> Métodos anticoncepcionais</label> <br>
                <label><input type="checkbox"> Infecções sexualmente transmissíveis</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 6 -->
    <div class="modulo">
        <div class="numero">6</div>
        <div class="conteudo">
            <h3>Evolução</h3>
            <ul>
                <label><input type="checkbox"> Darwinismo e Lamarckismo</label> <br>
                <label><input type="checkbox"> Teoria sintética</label> <br>
                <label><input type="checkbox"> Fatores evolutivos</label> <br>
                <label><input type="checkbox"> Registro fóssil</label> <br>
                <label><input type="checkbox"> Origem da vida</label>
            </ul>
        </div>
    </div>

</div>


    <!-- Seu JS da sidebar -->
    <script src="../../scripts/loadSidebar.js"></script>
    <script src="../../scripts/sidebar.js"></script>

    <!-- Bootstrap JS (necessário pro dropdown funcionar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
