<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cedeefe</title>

    <!-- Ícones do Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Ícones Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS externo -->
    <link rel="stylesheet" href="../estilos/sidebar.css">
    <link rel="stylesheet" href="../estilos/roadmapsDisc.css">
</head>
<body>

     <!-- SIDEBARRRR -->
    <div id="sidebar-container"></div>


    <div class="header">
        <div>
            <h1>Roadmaps</h1>
            <h2>Domine os aspectos da química.</h2>
        </div>

        <span class="icone">
           <span class="material-symbols-outlined icone2">experiment</span>
        </span>
    </div>
            
<div class="timeline">

    <!-- Módulo 1 -->
    <div class="modulo">
        <div class="numero">1</div>
        <div class="conteudo">
            <h3>Matéria</h3>
            <ul>
                <label><input type="checkbox"> Propriedades da matéria</label> <br>
                <label><input type="checkbox"> Estados físicos</label> <br>
                <label><input type="checkbox"> Mudanças de estado</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 2 -->
    <div class="modulo">
        <div class="numero">2</div>
        <div class="conteudo">
            <h3>Estrutura Atômica</h3>
            <ul>
                <label><input type="checkbox"> Modelos atômicos</label> <br>
                <label><input type="checkbox"> Partículas subatômicas (próton, nêutron, elétron)</label> <br>
                <label><input type="checkbox"> Número atômico e massa</label> <br>
                <label><input type="checkbox"> Íons</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 3 -->
    <div class="modulo">
        <div class="numero">3</div>
        <div class="conteudo">
            <h3>Tabela Periódica</h3>
            <ul>
                <label><input type="checkbox"> Elementos químicos</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 4 -->
    <div class="modulo">
        <div class="numero">4</div>
        <div class="conteudo">
            <h3>Substâncias e Misturas</h3>
            <ul>
                <label><input type="checkbox"> Substâncias puras</label> <br>
                <label><input type="checkbox"> Misturas homogêneas e heterogêneas</label> <br>
                <label><input type="checkbox"> Fases e componentes</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 5 -->
    <div class="modulo">
        <div class="numero">5</div>
        <div class="conteudo">
            <h3>Separação de Misturas</h3>
            <ul>
                <label><input type="checkbox"> Métodos de separação</label> <br>
                <label><input type="checkbox"> Misturas miscíveis e imiscíveis</label>
            </ul>
        </div>
    </div>

    <!-- Módulo 6 -->
    <div class="modulo">
        <div class="numero">6</div>
        <div class="conteudo">
            <h3>Transformações Químicas</h3>
            <ul>
                <label><input type="checkbox"> Evidências de reações químicas</label> <br>
                <label><input type="checkbox"> Reagentes e produtos</label>
            </ul>
        </div>
    </div>

</div>


    <!-- Seu JS da sidebar -->
    <script src="../scripts/loadSidebar.js"></script>
    <script src="../scripts/sidebar.js"></script>

    <!-- Bootstrap JS (necessário pro dropdown funcionar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
