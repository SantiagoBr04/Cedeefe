<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cedeefe</title>

    <!-- Ícones do Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Ícones Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS externo -->
    <link rel="stylesheet" href="../estilos/sidebar.css">
</head>
<body>

     <!-- SIDEBARRRR -->
    <div id="sidebar-container"></div>


    <div class="criarConta">
        <form class="login" action="" method="post">
            <h2 class="titulo-form">Criar Conta</h2>
            
            <!-- Campo de nome -->
            <div class="form-group">
                <label for="nome">Nome completo:  </label>
                <input type="text" id="nomeCompleto" name="nomeCompleto" required>
            </div>

            <!-- Campo de aniversário -->
            <div class="form-group">
                <label for="dataNascimento">Data de nascimento:  </label>
                <input type="date" id="dataNascimento" name="dataNascimento">
            </div>

            <!-- Campo de gênero -->
            <div class="form-group">
                <p>Gênero:</p>
                    <input type="radio" id="masc" name="genero" value="masculino">
                    <label for="masc">Masculino</label><br>

                    <input type="radio" id="fem" name="genero" value="feminino">
                    <label for="fem">Feminino</label><br>
                    
                    <input type="radio" id="nb" name="genero" value="naobinario">
                    <label for="nb">Não-Binário</label>
            </div>

            <!-- Campo de escola -->
            <div class="form-group">
                <label for="dataNascimento">Data de nascimento:  </label>
                <input type="date" id="dataNascimento" name="dataNascimento">
            </div>

            <!-- Campo de motivação -->
            <div class="form-group">
                <label for="dataNascimento">Por que você está usando o Cedeefe?  </label>
                <input type="text" id="motivacao" name="motivacao" maxlength="180">
            </div>

            <!-- Campo de email -->
            <div class="form-group">
                <label for="email">Email:  </label>
                <input type="email" id="email" name="email" required>
            </div>

            <!-- Campo de senha -->
            <div class="form-group">
                <label for="">Senha:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <!-- Checkbox "lembrar-me"-->
            <div class="form-group">
                <label for="lembrar-senha">Lembrar-me</label>
                <input type="checkbox" id="lembrar-senha" name="lembrar-senha">
            </div>



            
            <!-- Botão de criar conta -->
            <button class="botao" type="submit">Criar conta</button>

    <!-- Seu JS da sidebar -->
    <script src="../scripts/loadSidebar.js"></script>
    <script src="../scripts/sidebar.js"></script>

    <!-- Bootstrap JS (necessário pro dropdown funcionar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
