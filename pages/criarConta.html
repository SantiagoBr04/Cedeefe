<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cedeefe</title>

    <!-- Ícones do Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Ícones Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS externo -->
    <link rel="stylesheet" href="../estilos/sidebar.css">
    <link rel="stylesheet" href="../estilos/criarConta.css">
</head>

<body>

    <!-- SIDEBARRRR -->
    <div id="sidebar-container"></div>



        <!-- blobs -->
        <img src="../imagens/blobRosa.svg" alt="blob rosa" class="blob-rosa">
        <img src="../imagens/livro.svg" alt="Livros" class="livro">

        <div class="content">

        <!-- Formulário -->
        <div class="criarConta">
            <form class="login" action="" method="post">

                <div id="etapa1">

                    <h2 class="titulo-form">Criar Conta</h2>

                    <!-- Nome -->
                    <div class="mb-3">
                        <label for="nomeCompleto" class="form-label">Nome completo</label>
                        <input type="text" class="form-control" id="nomeCompleto" name="nomeCompleto" required>
                    </div>

                    <!-- Data de nascimento -->
                    <div class="mb-3">
                        <label for="dataNascimento" class="form-label">Data de nascimento</label>
                        <input type="date" class="form-control" id="dataNascimento" name="dataNascimento">
                    </div>

                    <!-- Gênero -->
                    <div class="mb-3">
                        <label class="form-label d-block">Gênero</label>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="genero" id="masc" value="masculino">
                            <label class="form-check-label" for="masc">
                                Masculino
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="genero" id="fem" value="feminino">
                            <label class="form-check-label" for="fem">
                                Feminino
                            </label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="genero" id="nb" value="naobinario">
                            <label class="form-check-label" for="nb">
                                Não-binário
                            </label>
                        </div>
                    </div>

                    <button type="button" class="btn botao" onclick="proximaPagina1()">
                        Próximo
                    </button>
                    </div>



                <div id="etapa2">

                    <h2 class="titulo-form">Criar Conta</h2>

                    <!-- Escola -->
                    <div class="mb-3">
                        <label for="escola" class="form-label">Escola</label>
                        <input type="text" class="form-control" id="escola" name="escola">
                    </div>

                    <!-- Motivação -->
                    <div class="mb-3">
                        <label for="motivacao" class="form-label">
                            Por que você está usando o Cedeefe?
                        </label>

                        <textarea 
                            class="form-control" 
                            id="motivacao" 
                            name="motivacao" 
                            rows="3"
                            maxlength="180">
                        </textarea>

                        <div class="form-text">
                            Máximo de 180 caracteres.
                        </div>
                    </div>

                    <button type="button" class="btn botao" onclick="voltarPagina1()">
                        Voltar
                    </button>

                    <button type="button" class="btn botao" onclick="proximaPagina2()">
                        Próximo
                    </button>
                </div>
                

                <div id="etapa3">
                    <h2 class="titulo-form">Criar Conta</h2>

                    <!-- Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" required>

                        <div class="form-text">
                            Nunca compartilharemos seu e-mail com ninguém.
                        </div>
                    </div>

                    <!-- Senha -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <!-- Checkbox -->
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="lembrarSenha" name="lembrarSenha">

                        <label class="form-check-label" for="lembrarSenha">
                            Lembrar-me
                        </label>
                    </div>

                    <!-- Links -->
                    <p class="recuperar">
                        Já possui uma conta?
                        <a href="login.html">Entrar</a>
                    </p>

                    <button type="button" class="btn botao" onclick="voltarPagina2()">
                        Voltar
                    </button>

                    <button type="submit" class="btn botao">
                        Criar conta
                    </button>
                </div>

            </form>
        </div>
    </div>



    <!-- Seu JS da sidebar -->
    <script src="../scripts/loadSidebar.js"></script>
    <script src="../scripts/sidebar.js"></script>

    <script src="../scripts/etapasConta.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
